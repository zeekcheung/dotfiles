[settings]
experimental = true

node.mirror_url = "https://mirrors.ustc.edu.cn/node/"
npm.package_manager = "bun"

url_replacements = { "https://github.com" = "https://v6.gh-proxy.org/https://github.com" }

[env]
NPM_CONFIG_REGISTRY = "https://registry.npmmirror.com"
PIP_INDEX_URL = "https://pypi.tuna.tsinghua.edu.cn/simple"
GOPROXY = "https://goproxy.cn,direct"
RUSTUP_DIST_SERVER = "https://rsproxy.cn"
RUSTUP_UPDATE_ROOT = "https://rsproxy.cn/rustup"
CARGO_REGISTRIES_CRATES_IO_PROTOCOL = "sparse"
CARGO_SOURCE_CRATES_IO_REPLACE_WITH = "rsproxy"
CARGO_SOURCE_RSPROXY_REGISTRY = "sparse+https://rsproxy.cn/index/"
